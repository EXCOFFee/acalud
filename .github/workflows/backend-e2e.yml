name: Backend E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  e2e-tests:
    name: Run backend Jest e2e suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acalud_testing
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: acalud_testing
      NODE_ENV: test
      JWT_SECRET: test-secret-ci
      STORAGE_PATH: ./uploads/test-ci
      TEACHER_ALLOWED_DOMAINS: test.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      - name: Prepare test environment file
        run: |
          cat <<'EOF' > .env.ci
          NODE_ENV=test
          DB_HOST=postgres
          DB_PORT=5432
          DB_USERNAME=postgres
          DB_PASSWORD=postgres
          DB_NAME=acalud_testing
          JWT_SECRET=test-secret-ci
          STORAGE_PATH=./uploads/test-ci
          TEACHER_ALLOWED_DOMAINS=test.com
          EOF
        working-directory: backend

      - name: Wait for database
        run: |
          for i in {1..15}; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              exit 0
            fi
            sleep 3
          done
          exit 1
        env:
          PGPASSWORD: postgres

      - name: Run e2e tests
        run: pnpm run test:e2e
        working-directory: backend
        env:
          E2E_ENV_FILE: .env.ci
