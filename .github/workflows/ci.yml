name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Los 8 gates de calidad (5.1 §4). Ninguna etapa de 5.2 avanza con el pipeline en rojo.
permissions:
  contents: read

jobs:
  # 1 · Lint + regla de fronteras hexagonales (import boundaries, ADR-002)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm lint
      - name: Fronteras hexagonales (dependency-cruiser)
        run: pnpm deps:boundaries

  # 2 · Typecheck (tsc --noEmit) en web y api
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm typecheck

  # 3 · Contrato OpenAPI (lint Redocly de la spec 2.4; Spectral crashea en OpenAPI 3.1)
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm contract:lint

  # 4 · Tests unitarios (dominio + arquitectura)
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm test:unit

  # 5 · Tests de integración (Testcontainers + PostgreSQL real desde la tarea 0.2)
  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm test:integration

  # 6 · Scanner de secretos (gitleaks) — ningún secreto en el repo (ADR-005 §7)
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 7 · Auditoría de dependencias — gate bloqueante para CVE critical (NFR-S3).
  #      osv-scanner (OSV.dev) reemplaza a `pnpm audit`: npm retiró su endpoint de audit (410).
  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: osv-scanner (escaneo del lockfile contra OSV.dev)
        run: |
          set +e
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner:v1.9.2 \
            --lockfile=/src/pnpm-lock.yaml --format=json > osv.json
          code=$?
          echo "osv-scanner exit: $code"
          # 0 = sin vulns · 1 = vulns encontradas (la severidad la clasifica el gate) · otro = error real
          if [ "$code" != "0" ] && [ "$code" != "1" ]; then
            echo "::error::osv-scanner falló (exit $code) — el gate no se evalúa a ciegas"
            head -c 2000 osv.json
            exit 1
          fi
      - name: Gate — bloquea si hay CVE critical (CVSS >= 9.0)
        run: node .github/scripts/gate-osv-critical.mjs osv.json

  # 8 · Build de web (static export) + api
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm build
