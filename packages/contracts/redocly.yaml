# Lint del contrato OpenAPI (gate `contract`, 5.1 §4).
# Se usa Redocly en lugar de Spectral porque Spectral 6.x crashea al parsear OpenAPI 3.1
# (bug de su motor JSONPath `nimma`); 2.4 §validación permite "Spectral o equivalente".
apis:
  acalud:
    root: ../../docs/02-arquitectura/2.4-contratos/openapi.yaml

extends:
  - recommended

rules:
  # Correctitud estructural: se mantienen como error.
  struct: error
  path-parameters-defined: error
  no-invalid-media-type-examples: error
  # Reglas de estilo opcionales: la spec usa `summary` con la referencia al CU en lugar de
  # operationId, y documenta los 4xx caso por caso; 2.4 no los exige. Se bajan a off para que
  # el gate falle solo ante problemas reales de contrato, no de estilo.
  operation-operationId: off
  operation-4xx-response: off
  operation-summary: off
  tag-description: off
  info-license: off
  no-server-example.com: off
